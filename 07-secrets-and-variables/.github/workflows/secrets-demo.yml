# ============================================================
# 07 - Secrets and Variables Demo
# ============================================================
# 📚 Module: 07 - Secrets and Variables
#
# Demonstrates: accessing secrets and config variables
#
# ⚠️ SETUP REQUIRED: Before running, create these in your
#    repo settings (Settings → Secrets and Variables → Actions):
#
#    Secrets:
#      DEMO_SECRET = "my-super-secret-value"
#
#    Variables:
#      DEMO_VAR = "my-config-value"
#      APP_REGION = "us-east-1"
# ============================================================

name: 07 - Secrets and Variables

on:
  workflow_dispatch:

jobs:
  secrets_demo:
    runs-on: ubuntu-latest
    steps:
      # ── Accessing secrets (masked in logs) ──
      - name: 🔒 Access a secret
        env:
          MY_SECRET: ${{ secrets.DEMO_SECRET }}
        run: |
          echo "================================"
          echo "🔒 Secret Demo:"
          echo "================================"
          echo "Secret value: $MY_SECRET"
          echo "  👆 You'll see **** in the logs (masked!)"
          echo ""
          echo "Secret length: ${#MY_SECRET}"
          echo "  👆 Length is NOT masked"
          echo ""
          echo "Is secret set? $([ -n '${{ secrets.DEMO_SECRET }}' ] && echo 'YES' || echo 'NO')"
          echo "================================"

      # ── Accessing variables (visible in logs) ──
      - name: 📋 Access variables
        run: |
          echo "================================"
          echo "📋 Variables Demo:"
          echo "================================"
          echo "DEMO_VAR: ${{ vars.DEMO_VAR }}"
          echo "APP_REGION: ${{ vars.APP_REGION }}"
          echo "  👆 Variables are NOT masked — they're config, not secrets"
          echo "================================"

      # ── Built-in GITHUB_TOKEN secret ──
      - name: 🔑 Built-in GITHUB_TOKEN
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "================================"
          echo "🔑 GITHUB_TOKEN:"
          echo "================================"
          echo "Token: $GH_TOKEN"
          echo "  👆 Auto-generated per workflow run"
          echo "  👆 Scoped to this repo only"
          echo "  👆 Expires when workflow ends"
          echo "================================"

      # ── Conditional based on secret existence ──
      - name: 🔀 Check if optional secret exists
        env:
          OPTIONAL: ${{ secrets.OPTIONAL_SECRET }}
        run: |
          if [ -z "$OPTIONAL" ]; then
            echo "⚠️ OPTIONAL_SECRET is not set — skipping optional step"
          else
            echo "✅ OPTIONAL_SECRET is set — proceeding"
          fi
