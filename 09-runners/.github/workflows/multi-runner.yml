# ============================================================
# 09 - Multi-Runner Demo
# ============================================================
# 📚 Module: 09 - Runners
#
# Runs the same job on Linux, macOS, and Windows
# to demonstrate cross-platform workflow execution
# ============================================================

name: 09 - Multi-Runner

on:
  workflow_dispatch:

jobs:
  # ── Using matrix to run on multiple OS ──
  cross_platform:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: "🖥️ Runner Information"
        run: |
          echo "================================"
          echo "🖥️ Runner: ${{ matrix.os }}"
          echo "================================"
          echo "runner.os:   ${{ runner.os }}"
          echo "runner.arch: ${{ runner.arch }}"
          echo "runner.name: ${{ runner.name }}"
          echo "runner.temp: ${{ runner.temp }}"
          echo "================================"

      - name: "📋 System Details"
        shell: bash
        run: |
          echo "OS Info:"
          uname -a || true
          echo ""
          echo "Current user: $(whoami)"
          echo "Working dir: $(pwd)"
          echo "Shell: $SHELL"

      - name: "💾 Disk Space"
        shell: bash
        run: |
          echo "Disk usage:"
          df -h / 2>/dev/null || df -h 2>/dev/null | head -5

      - name: "🧰 Available Tools"
        shell: bash
        run: |
          echo "Checking common tools:"
          echo "  git:    $(git --version 2>/dev/null || echo 'not found')"
          echo "  curl:   $(curl --version 2>/dev/null | head -1 || echo 'not found')"
          echo "  node:   $(node --version 2>/dev/null || echo 'not found')"
          echo "  python: $(python3 --version 2>/dev/null || echo 'not found')"
          echo "  docker: $(docker --version 2>/dev/null || echo 'not found')"
