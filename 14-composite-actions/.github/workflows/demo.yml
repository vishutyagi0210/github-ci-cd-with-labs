name: "main-demo"

on:
  workflow_dispatch:
  inputs:
    first_name:
      description: "Enter your first name"
      required: true
      default: "Vishal"
    last_name:
      description: "Enter your last name"
      required: true
      default: "Tyagi"

jobs:
  name_extract:
    runs-on: ubuntu-latest

    outputs:
      first_name: ${{ steps.checkout.outputs.fname }}
      last_name: ${{ steps.checkout.outputs.lname }}
      full_name: ${{ steps.checkout.outputs.flname }}

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "checking out the code"
        id: checkout
        uses: ./.github/actions/exportname
        with:
          first_name: ${{ github.event.inputs.first_name }}
          last_name: ${{ github.event.inputs.last_name }}

      - name: "printing the name"
        run: |
          echo "First Name: ${{ steps.checkout.outputs.fname }}"
          echo "Last Name: ${{ steps.checkout.outputs.lname }}"
          echo "Full Name: ${{ steps.checkout.outputs.flname }}"

  name_extraction2:
    runs-on: ubuntu-latest
    needs: name_extract
    
    steps:
      - name: "printing abouve job outptu"
        run: |
          echo "First Name: ${{ needs.name_extract.outputs.first_name }}"
          echo "Last Name: ${{ needs.name_extract.outputs.last_name }}"
          echo "Full Name: ${{ needs.name_extract.outputs.full_name }}"